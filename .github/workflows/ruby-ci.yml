name: CI

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - master

jobs:
  build:
    name: Ruby ${{ matrix.version }} ${{ matrix.gemfile }}
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}
    strategy:
      matrix:
        version:
          - '3.1'
          - '3.2'
          - '3.3'
        gemfile:
          - gemfiles/Gemfile.rails50
          - gemfiles/Gemfile.rails51
          - gemfiles/Gemfile.rails52
          - gemfiles/Gemfile.rails60
          - gemfiles/Gemfile.rails_master
        exclude:
          - version: '3.1'
            gemfile: gemfiles/Gemfile.rails_master
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.version }}
          bundler-cache: true

      # IXOPAY Safety Net is the authoritative test suite for this fork.
      # It covers all IXOPAY-specific work: the 4 active + 27 inactive TokenEx-only
      # gateways, 19 behavioral baseline tests, and the compatibility shim module.
      - name: IXOPAY Safety Net Tests
        run: bundle exec rake test:safety_net

      # Upstream unit tests run informationally. Pre-existing failures/errors in
      # upstream gateways (e.g., REXML::ParseException in ElavonTest) are tracked
      # via the weekly upstream-sync workflow, not this per-PR check.
      - name: Upstream Unit Tests (informational)
        run: bundle exec rake test:units
        continue-on-error: true

      # Rubocop runs informationally. The 27 inactive TokenEx-only gateways were
      # copied verbatim from the legacy fork and have pre-existing style offenses
      # that will be cleaned up incrementally in follow-up PRs.
      - name: Linter (informational)
        run: bundle exec rubocop
        continue-on-error: true
